# FoodDraft nginx config — serves BOTH URLs from the same backend (127.0.0.1:4100).
# The Node process serves the built frontend + API + WebSocket, so nginx just proxies.

# ── 1) WebSocket upgrade map — put ONCE in the http{} context ──────────────────
#    (skip if you already have a `map $http_upgrade $connection_upgrade` somewhere)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ── 2) Subdomain:  https://fooddraft.payrollgm.com  ────────────────────────────
server {
  listen 80;
  server_name fooddraft.payrollgm.com;

  location / {
    proxy_pass http://127.0.0.1:4100;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }
}

# ── 3) Subpath:  https://payrollgm.com/fooddraft  ──────────────────────────────
#    Paste these two location blocks INSIDE your existing
#    `server { server_name payrollgm.com; ... }` block.
#    The trailing slash on proxy_pass strips the /fooddraft/ prefix, so the Node
#    app (which lives at the root) doesn't need to know about the subpath.

#   location = /fooddraft { return 301 /fooddraft/; }
#
#   location /fooddraft/ {
#     proxy_pass http://127.0.0.1:4100/;
#     proxy_http_version 1.1;
#     proxy_set_header Host              $host;
#     proxy_set_header X-Real-IP         $remote_addr;
#     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header Upgrade           $http_upgrade;
#     proxy_set_header Connection        $connection_upgrade;
#   }

# ── HTTPS ──────────────────────────────────────────────────────────────────────
# After the HTTP config works, add certs:
#   sudo certbot --nginx -d fooddraft.payrollgm.com
# The subpath is already covered by your existing payrollgm.com certificate.
